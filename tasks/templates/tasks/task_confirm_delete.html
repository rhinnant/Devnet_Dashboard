<!-- tasks/templates/tasks/task_confirm_delete.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Delete Task</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 40px auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #c82333;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            justify-content: space-around;
        }
        form {
            display: inline;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .cancel {
            background-color: #6c757d;
            color: white;
        }
        .delete {
            background-color: #dc3545;
            color: white;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Confirm Delete</h1>
    <p>Are you sure you want to delete the task "<strong>{{ task.title }}</strong>"?</p>
    <div class="buttons">
        <form method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="delete">Delete</button>
        </form>
        <a href="{% url 'task_list' %}"><button class="cancel">Cancel</button></a>
    </div>
</div>
</body>
</html>
